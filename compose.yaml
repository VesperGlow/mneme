name: memory-graph-agent

# 单容器单进程部署：Rust 二进制内含 HTTP API、SQLite 长期记忆与 QQ 桥接，
# 只需填好 .env 即可启动。没有本地模型，模型调用全部走 DeepSeek 官方 API。
services:
  agent:
    image: ${APP_IMAGE:-ghcr.io/vesperglow/mneme:latest}
    build:
      context: .
    restart: unless-stopped
    # 优雅停机：给进程留出 flush 在途消息与落库的时间（代码里的 SHUTDOWN_TIMEOUT_SECONDS 是 30s），
    # 否则默认 10s 后就 SIGKILL，等于白等。
    stop_grace_period: 40s
    env_file:
      - .env
    # 纯文本进出，稳态只有几十 MB（axum + SQLite，无本地模型、无图片解码）。
    mem_limit: ${MEM_LIMIT:-256m}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-8000}:8000"
      - "${QQ_BOT_BIND_IP:-127.0.0.1}:${QQ_BOT_PORT:-9000}:9000"
    volumes:
      - app_data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:8000/health/live >/dev/null &&
          curl -fsS http://localhost:9000/healthz >/dev/null
      interval: 15s
      timeout: 5s
      retries: 5
      # 无模型下载，启动就是开监听，几秒即可就绪。
      start_period: 30s

volumes:
  app_data:

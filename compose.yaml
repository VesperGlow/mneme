name: memory-graph-agent

# 单容器部署：Neo4j、TEI embedding、AI API、QQ 桥接全部在同一个镜像里，
# 只需填好 .env 即可启动。
services:
  agent:
    image: ${APP_IMAGE:-ghcr.io/vesperglow/qq-agent:latest}
    build:
      context: .
      args:
        GOPROXY: ${GO_PROXY:-https://goproxy.cn,direct}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-8000}:8000"
      - "${QQ_BOT_BIND_IP:-127.0.0.1}:${QQ_BOT_PORT:-9000}:9000"
      # Neo4j Browser / Bolt，仅调试用，默认只监听本机。
      - "${NEO4J_BROWSER_BIND_IP:-127.0.0.1}:7474:7474"
      - "${NEO4J_BROWSER_BIND_IP:-127.0.0.1}:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - model_cache:/models
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://127.0.0.1:8000/health/live >/dev/null &&
          curl -fsS http://127.0.0.1:9000/healthz >/dev/null
      interval: 15s
      timeout: 5s
      retries: 5
      # 首次启动要下载 embedding 模型（约 1.2GB），给足冷启动时间。
      start_period: 300s

volumes:
  neo4j_data:
  neo4j_logs:
  model_cache:

name: memory-graph-agent

# 单容器单进程部署：Rust 二进制内含 HTTP API、进程内 ONNX embedding、
# SQLite 分级记忆与 QQ 桥接，只需填好 .env 即可启动。
services:
  agent:
    image: ${APP_IMAGE:-ghcr.io/vesperglow/qq-agent:latest}
    build:
      context: .
    restart: unless-stopped
    # 优雅停机：给进程留出 flush 在途消息与落库的时间（须 > SHUTDOWN_TIMEOUT_SECONDS，默认 30s），
    # 否则默认 10s 后就 SIGKILL，等于白等。
    stop_grace_period: 40s
    env_file:
      - .env
    # embedding 权重约 650MB 常驻，稳态总占用 <1GB；上限兜底 2GB。
    mem_limit: ${MEM_LIMIT:-2g}
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-8000}:8000"
      - "${QQ_BOT_BIND_IP:-127.0.0.1}:${QQ_BOT_PORT:-9000}:9000"
    volumes:
      - app_data:/data
      - model_cache:/models
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS http://localhost:8000/health/live >/dev/null &&
          curl -fsS http://localhost:9000/healthz >/dev/null
      interval: 15s
      timeout: 5s
      retries: 5
      # 首次启动要下载 embedding 模型（约 640MB），给足冷启动时间。
      start_period: 300s

volumes:
  app_data:
  model_cache:

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph Memory Agent</title>
  <style>
    :root { color-scheme: dark; --bg:#111315; --panel:#1a1d21; --line:#30343a; --text:#eef0f3; --muted:#9da5af; --accent:#7bdcb5; }
    * { box-sizing:border-box; }
    body { margin:0; background:radial-gradient(circle at top left,#18322b 0,transparent 34rem),var(--bg); color:var(--text); font:15px/1.55 ui-sans-serif,system-ui,sans-serif; }
    main { width:min(900px,calc(100% - 28px)); margin:36px auto; }
    h1 { margin:0; font-size:clamp(25px,5vw,42px); letter-spacing:-.04em; }
    .lead { color:var(--muted); margin:8px 0 24px; }
    .bar,.composer { display:flex; gap:10px; flex-wrap:wrap; }
    input,textarea,button { border:1px solid var(--line); border-radius:12px; background:var(--panel); color:var(--text); padding:11px 13px; font:inherit; }
    input { flex:1; min-width:170px; }
    textarea { width:100%; min-height:92px; resize:vertical; }
    button { background:var(--accent); color:#0a2119; border:0; font-weight:750; cursor:pointer; min-width:96px; }
    button:disabled { opacity:.55; cursor:wait; }
    #messages { min-height:280px; margin:20px 0; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:86%; padding:13px 15px; border:1px solid var(--line); border-radius:16px; white-space:pre-wrap; }
    .user { align-self:flex-end; background:#24493d; }
    .assistant { align-self:flex-start; background:var(--panel); }
    .meta { color:var(--muted); font-size:12px; margin-top:7px; }
    .composer button { align-self:stretch; }
    .composer .text { flex:1; min-width:240px; }
    details { margin-top:18px; color:var(--muted); }
    code { color:var(--accent); }
  </style>
</head>
<body>
<main>
  <h1>Mneme</h1>
  <p class="lead">SQLite 长期记忆 × DeepSeek（思考等级 max）</p>
  <div class="bar">
    <input id="user" value="demo-user" aria-label="用户 ID" placeholder="用户 ID">
    <input id="key" type="password" aria-label="API Key" placeholder="APP_API_KEY">
  </div>
  <section id="messages"></section>
  <form id="form" class="composer">
    <div class="text"><textarea id="message" placeholder="说点什么，比如：请记住我偏好简洁的中文回答。"></textarea></div>
    <button id="send">发送</button>
  </form>
  <details><summary>连接状态与提示</summary><p id="status">正在检查服务……</p></details>
</main>
<script>
  const $ = id => document.getElementById(id);
  let conversationId = localStorage.getItem('conversationId') || null;
  $('key').value = localStorage.getItem('appKey') || '';
  $('user').value = localStorage.getItem('userId') || 'demo-user';
  const headers = () => ({'Content-Type':'application/json', ...($('key').value ? {'Authorization':`Bearer ${$('key').value}`} : {})});
  function add(role,text,meta='') { const el=document.createElement('div'); el.className=`msg ${role}`; el.textContent=text; if(meta){const m=document.createElement('div');m.className='meta';m.textContent=meta;el.append(m)} $('messages').append(el); el.scrollIntoView({behavior:'smooth'}); }
  async function health(){ try { const r=await fetch('/health'); const d=await r.json(); $('status').textContent=`${d.status} · 数据库 ${d.database?'✓':'×'} · AI 配置 ${d.llm_configured?'✓':'×'}`; } catch(e){ $('status').textContent=`无法连接：${e}`; } }
  $('form').addEventListener('submit', async e => { e.preventDefault(); const text=$('message').value.trim(); if(!text)return; localStorage.setItem('appKey',$('key').value); localStorage.setItem('userId',$('user').value); add('user',text); $('send').disabled=true; try { const r=await fetch('/v1/chat',{method:'POST',headers:headers(),body:JSON.stringify({user_id:$('user').value,message:text,conversation_id:conversationId})}); const d=await r.json(); if(!r.ok) throw new Error(d.detail||JSON.stringify(d)); conversationId=d.conversation_id; localStorage.setItem('conversationId',conversationId); $('message').value=''; const meta=`检索 ${d.retrieved_memories.length} 条 · 新记忆 ${d.saved_memories.length} 条${d.warnings.length?' · '+d.warnings.join('；'):''}`; add('assistant',d.message,meta); } catch(err) { add('assistant',`请求失败：${err.message}`); } finally { $('send').disabled=false; $('message').focus(); } });
  health();
</script>
</body>
</html>

name: Build, test and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Rust binary
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # TEMP：Cargo.lock 是在没有 cargo 的机器上手工裁剪的，与解析结果不符。
      # 本次先让 cargo 自己重新解析并把结果带出来，拿到后恢复 --locked 并删掉本步骤。
      - name: TEMP regenerate lockfile
        run: cargo generate-lockfile

      - name: TEMP upload regenerated Cargo.lock
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-lock
          path: Cargo.lock

      - name: Unit tests
        run: cargo test

      - name: Release build (mirrors the docker build step)
        run: |
          set -o pipefail
          cargo build --release 2>&1 | tee /tmp/build.log || {
            grep -E "^error" -A6 /tmp/build.log | head -60 | \
              while IFS= read -r line; do echo "::error::${line}"; done
            exit 1
          }

      - name: Validate Compose file
        run: |
          cp .env.example .env
          docker compose -f compose.yaml config --quiet

  docker-build:
    name: Build and publish image
    needs: test
    # TEMP：Dockerfile 里仍是 cargo build --locked，本次 lock 还没修好必然失败；
    # 而且这一步会把镜像推上 GHCR（quadlet 的 AutoUpdate 会自动拉），lock 定下来之前不该跑。
    # 恢复 --locked 时一并删掉这一行。
    if: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/vesperglow/mneme:latest
            ghcr.io/vesperglow/mneme:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Mneme
          cache-from: type=gha,scope=rust
          cache-to: type=gha,mode=max,scope=rust

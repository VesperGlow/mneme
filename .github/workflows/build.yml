name: Build, test and publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python and Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install Python dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Test Python service
        env:
          PYTHONPATH: ${{ github.workspace }}/app
        run: python -m pytest -q

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache-dependency-path: qqbot/go.sum

      - name: Test QQ bridge
        working-directory: qqbot
        run: go test -race ./...

      - name: Vet QQ bridge
        working-directory: qqbot
        run: go vet ./...

      - name: Validate Compose file
        run: |
          cp .env.example .env
          docker compose -f compose.yaml config --quiet

  docker-build:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/vesperglow/qq-agent:latest
            ghcr.io/vesperglow/qq-agent:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=QQ Agent
          build-args: GOPROXY=https://proxy.golang.org,direct
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined
